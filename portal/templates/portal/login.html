<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Portal Login</title>
    <style>
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: linear-gradient(135deg, #17324d, #2d7dd2); font-family: "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", "Segoe UI", Tahoma, sans-serif; }
        .panel { width: min(460px, calc(100vw - 32px)); background: rgba(255,255,255,.97); border-radius: 24px; padding: 28px; box-shadow: 0 24px 50px rgba(0,0,0,.18); }
        h1 { margin: 0 0 8px; color: #17324d; }
        p { color: #60758a; margin: 0 0 20px; }
        label { display:block; font-weight: 700; margin: 14px 0 8px; }
        input { width: 100%; padding: 12px 14px; border-radius: 14px; border: 1px solid #cbd5e1; }
        button { margin-top: 18px; width: 100%; border: 0; padding: 13px 16px; border-radius: 14px; background: #2d7dd2; color: #fff; font-weight: 800; }
        .errorlist { color: #b91c1c; margin: 0 0 8px; padding-left: 18px; }
    </style>
</head>
<body>
    <form method="post" class="panel">
        {% csrf_token %}
        <h1>NEO Alarm Billing</h1>
        <p>사용자 포털 로그인</p>
        {{ form.non_field_errors }}
        <label for="id_username">Username</label>
        {{ form.username }}
        <label for="id_password">Password</label>
        {{ form.password }}
        <button type="submit">로그인</button>
    </form>
</body>
</html>
